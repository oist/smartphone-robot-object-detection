services:
  mediapipe-model-maker:
    build:
      context: .
      dockerfile: Dockerfile
    image: mediapipe-model-maker
    volumes:
      - .:/object-detection
    gpus: all
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    command: python train.py --export-fp16
